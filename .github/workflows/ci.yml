# CI Pipeline — runs tests for all three language implementations
#
# Lab 3: Add the workflow structure
# The steps for each job are already written. Your task is to add the
# structural YAML that makes this a working workflow:
#
#   - name          — give the workflow a display name
#   - on            — add triggers so it runs on push to main and on pull_request
#   - jobs          — wrap each group of steps in a proper job with:
#       - runs-on   — which runner to use (ubuntu-latest)
#       - defaults  — set working-directory so run steps execute in the right folder
#       - steps     — the steps are already listed below, ready to use
#
# See the Lab 3 instructions for details.

# Lab 3: Add a workflow name here

# Lab 3: Add triggers — right now only manual trigger is set
