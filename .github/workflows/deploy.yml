      # 1. Check out the repository
      # 2. Configure GitHub Pages
      # 3. Upload the frontend folder as a Pages artifact
      # 4. Deploy the artifact to GitHub Pages
      #
      # Hint: look at the actions/checkout, actions/configure-pages,
      #       actions/upload-pages-artifact, and actions/deploy-pages actions
      - run: echo "Replace this step with the real deployment steps"
